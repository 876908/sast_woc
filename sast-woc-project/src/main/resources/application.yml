spring:
  application:
    name: sast-woc-project
  #数据库相关配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://localhost:3306/sast_woc?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowMultiQueries=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&tinyInt1isBit=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

#Mybatis相关配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

#JWT配置
jwt:
  secret: SW1oYW5kc29tZQ==SW1oYW5kc29tZQ==SW1oYW5kc29tZQ==
  expiration: 3600000

#评委默认密码
judge:
  default-password: 123456